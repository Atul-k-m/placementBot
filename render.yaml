services:
  - type: web
    name: reminderbot-web
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -w 1 -k uvicorn.workers.UvicornWorker --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: reminderbot-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
databases:
  - name: reminderbot-db
    plan: free