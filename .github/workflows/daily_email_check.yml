name: Daily Email Check

on:
  schedule:
    # 8:00 AM IST = 02:30 UTC (IST is UTC+5:30)
    - cron: "30 2 * * *"
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

jobs:
  check-emails:
    name: Run Email Monitor Bot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          CALLMEBOT_API_KEY: ${{ secrets.CALLMEBOT_API_KEY }}
          WHATSAPP_PHONE: ${{ secrets.WHATSAPP_PHONE }}
          WATCH_SENDERS: ${{ secrets.WATCH_SENDERS }}
          LOOKBACK_HOURS: "25"
        run: python bot.py
